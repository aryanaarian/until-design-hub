<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>UNTIL Marylebone · Wi-Fi Card (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: "DIN 2014";
    src: url("fonts/DIN_2014_Bold.otf") format("opentype");
    font-weight: 700 900;
    font-style: normal;
    font-display: block;
  }

  @page { size: 4in 4in; margin: 0; }

  :root {
    --font-display: "DIN 2014", "DM Sans", system-ui, sans-serif;
    --font-body: "DM Sans", system-ui, sans-serif;
    --font-serif: "DM Serif Display", "Times New Roman", serif;
  }

  html, body { margin: 0; padding: 0; background: #e8e6e1; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 24px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @media print {
    body { background: #2C2A26; padding: 0; min-height: auto; }
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #2C2A26;
    color: #fff;
    font-family: var(--font-body);
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 80px;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
  }
  @media print {
    .card { box-shadow: none; }
  }

  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .head-logo { height: 38px; width: auto; display: block; }
  .head-branches {
    font-family: var(--font-body); font-weight: 500; font-size: 14px;
    letter-spacing: 0.2em; text-transform: uppercase; color: #fff;
    display: flex; gap: 10px; align-items: center; white-space: nowrap; flex-shrink: 0;
  }
  .head-branches .b { opacity: 0.4; white-space: nowrap; }
  .head-branches .b.is-current { opacity: 1; }
  .head-branches .dot { opacity: 0.4; font-weight: 700; transform: translateY(-0.08em); }

  .card-hero { display: flex; flex-direction: column; justify-content: center; gap: 56px; padding: 60px 0; }
  .welcome {
    font-family: var(--font-serif); font-weight: 400; font-size: 48px;
    line-height: 1; color: #fff; opacity: 0.85; margin: 0 0 24px 0;
  }
  .location {
    font-family: var(--font-display); font-weight: 700; font-size: 88px;
    line-height: 1; letter-spacing: -0.005em; text-transform: uppercase; color: #fff; margin: 0;
  }
  .location.long { font-size: 76px; line-height: 0.98; }

  .wifi-block {
    display: flex; flex-direction: column; gap: 32px;
    border-top: 1px solid rgba(245,241,234,.18);
    border-bottom: 1px solid rgba(245,241,234,.18);
    padding: 48px 0;
  }
  .wifi-fields { display: flex; flex-direction: column; gap: 32px; }
  .wifi-row { display: flex; flex-direction: column; gap: 4px; }
  .wifi-label {
    font-family: var(--font-body); font-weight: 500; font-size: 14px;
    letter-spacing: 0.32em; text-transform: uppercase; color: #fff; opacity: 0.55;
  }
  .wifi-value {
    font-family: var(--font-display); font-weight: 700; font-size: 72px;
    line-height: 1; letter-spacing: -0.005em; color: #fff;
    text-transform: uppercase; font-variant-numeric: tabular-nums;
  }
  .wifi-value.long { font-size: 60px; }
  .wifi-value.xlong { font-size: 52px; }

  .card-foot { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; }
  .foot-tagline {
    font-family: var(--font-serif); font-weight: 400; font-size: 40px;
    line-height: 1.15; color: #fff; max-width: 540px; margin: 0;
  }
  .foot-addr {
    font-family: var(--font-body); font-weight: 500; font-size: 18px;
    letter-spacing: 0.22em; text-transform: uppercase; color: #fff;
    line-height: 1.6; opacity: 0.85; text-align: right;
  }
</style>
<script>
  window.addEventListener('load', async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
    setTimeout(() => window.print(), 500);
  });
</script>
</head>
<body>
  <section class="card">
    <header class="card-head">
      <img class="head-logo" src="assets/until-wordmark-white.png" alt="UNTIL" />
      <nav class="head-branches"><span class="b">Soho</span><span class="dot">·</span><span class="b is-current">Marylebone</span><span class="dot">·</span><span class="b">Liverpool Street</span><span class="dot">·</span><span class="b">Canary Wharf</span></nav>
    </header>
    <div class="card-hero">
      <div>
        <p class="welcome">Welcome to</p>
        <h1 class="location long">Marylebone</h1>
      </div>
      <div class="wifi-block">
        <div class="wifi-fields">
          <div class="wifi-row">
            <span class="wifi-label">Wi-Fi Network</span>
            <span class="wifi-value xlong">UNTIL_MARYLEBONE</span>
          </div>
          <div class="wifi-row">
            <span class="wifi-label">Password</span>
            <span class="wifi-value">WELCOME24</span>
          </div>
        </div>
      </div>
    </div>
    <footer class="card-foot">
      <p class="foot-tagline">London's best health professionals are here.</p>
      <div class="foot-addr">
        23 Wigmore Street<br/>
        London W1U<br/>
        until.co.uk
      </div>
    </footer>
  </section>
</body>
</html>
