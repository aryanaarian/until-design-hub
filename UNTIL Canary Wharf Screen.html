<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>UNTIL — Canary Wharf · Digital Screen</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@87.5..125,400..900&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Canvas — portrait digital screen, 9:16 */
    --canvas-w: 1080px;
    --canvas-h: 1920px;

    /* Brand-ish (per brief) */
    --ink-charcoal: #2C2A26;   /* warm dark per brief */
    --ink-navy: #020417;       /* UNTIL navy */
    --ink-bone: #f5f1ea;       /* UNTIL bone */
    --paper: #ffffff;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #1a1916;
    color: #fff;
    font-family: "Archivo", system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Scale-to-fit stage */
  #stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
  }

  .canvas {
    width: var(--canvas-w);
    height: var(--canvas-h);
    position: relative;
    transform-origin: center center;
    box-shadow: 0 30px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.04);
    overflow: hidden;
  }

  /* ──────────────────────────────────────────────────── */
  /*  The actual screen design                            */
  /* ──────────────────────────────────────────────────── */
  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg, var(--ink-charcoal));
    color: var(--fg, #fff);
    padding: 96px 88px 88px 88px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: "Archivo", system-ui, sans-serif;
  }

  /* Block 1 — wordmark stack */
  .wordmark-block {
    margin-top: 280px;
  }

  .welcome {
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 56px;
    line-height: 1;
    letter-spacing: 0.005em;
    color: var(--fg, #fff);
    opacity: 0.92;
    margin: 0 0 26px 6px;
  }

  .until-mark {
    display: block;
    width: 100%;
    height: auto;
    /* Logo PNG is white on transparent. We tint via filter so it can adopt
       brand colors without manipulating the artwork itself. */
    filter: var(--mark-filter, none);
  }

  .canary-wharf {
    display: block;
    margin: 34px 0 0 0;
    text-align: center;
    font-family: "Archivo", system-ui, sans-serif;
    font-weight: 400;
    font-variation-settings: "wdth" 100, "wght" 400;
    font-size: 36px;
    line-height: 1;
    letter-spacing: 0.62em;          /* generous tracking per brief */
    text-indent: 0.62em;             /* offset for right-side tracking */
    color: var(--fg, #fff);
    text-transform: uppercase;
  }

  /* Block 2 — dominant statement */
  .statement {
    margin-top: 230px;
    font-family: "Archivo", system-ui, sans-serif;
    font-variation-settings: "wdth" 112, "wght" 900;
    font-weight: 900;
    font-size: 108px;
    line-height: 0.98;
    letter-spacing: -0.012em;
    color: var(--fg, #fff);
    text-transform: none;
    max-width: 880px;
  }

  .statement span {
    display: block;
  }

  /* Block 3 — triptych */
  .triptych {
    margin-top: 90px;
    font-family: "Archivo", system-ui, sans-serif;
    font-variation-settings: "wdth" 100, "wght" 400;
    font-size: 32px;
    line-height: 1.42;
    letter-spacing: 0.005em;
    color: var(--fg, #fff);
    opacity: 0.94;
  }

  .triptych .line {
    display: block;
  }

  .triptych .plus {
    display: inline-block;
    font-variation-settings: "wdth" 100, "wght" 800;
    font-weight: 800;
    padding: 0 0.18em;
    transform: translateY(-0.02em);
    color: var(--fg, #fff);
  }

  /* Block 4 — sign-off (bottom-left small logo) */
  .signoff {
    margin-top: auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 80px;
  }

  .signoff-mark {
    width: 220px;
    height: auto;
    filter: var(--mark-filter, none);
  }

  .signoff-meta {
    font-family: "Archivo", system-ui, sans-serif;
    font-variation-settings: "wdth" 100, "wght" 500;
    font-size: 18px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg, #fff);
    opacity: 0.55;
    text-align: right;
    line-height: 1.5;
  }

  /* ── Inverse modes (Tweaks) ─────────────────────────── */
  .screen[data-bg="navy"]      { --bg: var(--ink-navy); --fg: #fff; --mark-filter: none; }
  .screen[data-bg="charcoal"]  { --bg: var(--ink-charcoal); --fg: #fff; --mark-filter: none; }
  .screen[data-bg="bone"]      {
    --bg: var(--ink-bone);
    --fg: var(--ink-navy);
    /* Invert the white wordmark to navy without altering the artwork.
       White (#fff) → invert → black; then brightness lowers it; this gets close
       but for true brand color we use a more reliable approach: hue rotate to navy. */
    --mark-filter: brightness(0) saturate(100%) invert(7%) sepia(40%) saturate(2600%) hue-rotate(220deg) brightness(96%) contrast(105%);
  }
</style>
</head>
<body>

<div id="stage">
  <div class="canvas">
    <div id="screen-root"></div>
  </div>
</div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "bg": "charcoal",
  "showSignoffMeta": true,
  "statementSize": 108,
  "untilWidth": 100,
  "canaryTracking": 0.62,
  "topPad": 280
}/*EDITMODE-END*/;

// ── Scale-to-fit hook ─────────────────────────────────────
function useFitToViewport(ref) {
  useEffect(() => {
    function fit() {
      const el = ref.current;
      if (!el) return;
      const pad = 32;
      const sx = (window.innerWidth - pad * 2) / 1080;
      const sy = (window.innerHeight - pad * 2) / 1920;
      const s = Math.min(sx, sy, 1);
      el.style.transform = `scale(${s})`;
    }
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [ref]);
}

// ── The screen ────────────────────────────────────────────
function Screen({ tweaks }) {
  const canvasRef = useRef(null);
  useFitToViewport(canvasRef);

  // mount on existing .canvas instead of replacing
  useEffect(() => {
    const c = document.querySelector('.canvas');
    canvasRef.current = c;
    const fit = () => {
      const pad = 32;
      const sx = (window.innerWidth - pad * 2) / 1080;
      const sy = (window.innerHeight - pad * 2) / 1920;
      const s = Math.min(sx, sy, 1);
      c.style.transform = `scale(${s})`;
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div
      className="screen"
      data-bg={tweaks.bg}
      data-screen-label="01 Canary Wharf launch"
      style={{
        '--bg': tweaks.bg === 'navy' ? 'var(--ink-navy)' : tweaks.bg === 'bone' ? 'var(--ink-bone)' : 'var(--ink-charcoal)',
      }}
    >
      <div className="wordmark-block" style={{ marginTop: `${tweaks.topPad}px` }}>
        <p className="welcome" contentEditable suppressContentEditableWarning>Welcome to</p>

        <img
          className="until-mark"
          src="assets/until-wordmark-white.png"
          alt="UNTIL"
          draggable={false}
          style={{ width: `${tweaks.untilWidth}%`, marginLeft: tweaks.untilWidth < 100 ? `${(100-tweaks.untilWidth)/2}%` : 0 }}
        />

        <span
          className="canary-wharf"
          contentEditable
          suppressContentEditableWarning
          style={{ letterSpacing: `${tweaks.canaryTracking}em`, textIndent: `${tweaks.canaryTracking}em` }}
        >Canary Wharf</span>
      </div>

      <h1 className="statement" style={{ fontSize: `${tweaks.statementSize}px` }}>
        <span contentEditable suppressContentEditableWarning>London's best</span>
        <span contentEditable suppressContentEditableWarning>health specialists</span>
        <span contentEditable suppressContentEditableWarning>are here.</span>
      </h1>

      <div className="triptych">
        <span className="line" contentEditable suppressContentEditableWarning>
          Physiotherapy <span className="plus">+</span> Dentistry <span className="plus">+</span> Dermatology
        </span>
        <span className="line" contentEditable suppressContentEditableWarning>
          Personal Trainers <span className="plus">+</span> Doctors <span className="plus">+</span> Nutritionists…
        </span>
      </div>

      <div className="signoff">
        <img
          className="signoff-mark"
          src="assets/until-wordmark-white.png"
          alt="UNTIL"
          draggable={false}
        />
        {tweaks.showSignoffMeta && (
          <div className="signoff-meta" contentEditable suppressContentEditableWarning>
            Opening 2026<br/>until.co.uk
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const {
    TweaksPanel, TweakSection, TweakRadio, TweakSlider, TweakToggle
  } = window;

  return (
    <>
      <Screen tweaks={tweaks} />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Background">
          <TweakRadio
            label="Tone"
            value={tweaks.bg}
            onChange={(v) => setTweak('bg', v)}
            options={[
              { label: 'Charcoal', value: 'charcoal' },
              { label: 'Navy', value: 'navy' },
              { label: 'Bone', value: 'bone' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakSlider
            label="Top space" value={tweaks.topPad}
            min={120} max={420} step={10} unit="px"
            onChange={(v) => setTweak('topPad', v)}
          />
          <TweakSlider
            label="UNTIL width" value={tweaks.untilWidth}
            min={70} max={100} step={1} unit="%"
            onChange={(v) => setTweak('untilWidth', v)}
          />
          <TweakSlider
            label="Canary tracking" value={tweaks.canaryTracking}
            min={0.2} max={1.0} step={0.02} unit="em"
            onChange={(v) => setTweak('canaryTracking', v)}
          />
          <TweakSlider
            label="Statement size" value={tweaks.statementSize}
            min={72} max={132} step={2} unit="px"
            onChange={(v) => setTweak('statementSize', v)}
          />
        </TweakSection>
        <TweakSection label="Sign-off">
          <TweakToggle
            label="Show meta (date + URL)"
            value={tweaks.showSignoffMeta}
            onChange={(v) => setTweak('showSignoffMeta', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('screen-root'));
root.render(<App />);
</script>

</body>
</html>
